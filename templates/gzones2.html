<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌿 Green Zones – Flashy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a12;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .bg{position:absolute;inset:0;background:linear-gradient(45deg,#0a0a12,#111,#0a0a12);background-size:400% 400%;animation:bgMove 20s ease infinite;z-index:-2}
        @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .card{background:#111;padding:2rem;border-radius:20px;max-width:900px;width:100%;box-shadow:0 0 30px rgba(0,0,0,.7);position:relative;overflow:hidden}
        h1{font-size:2.4rem;text-align:center;background:linear-gradient(135deg,#00f,#a0f);-webkit-background-clip:text;color:transparent;margin-bottom:1rem}
        .img-wrapper{position:relative;overflow:hidden;border-radius:12px;border:3px solid #00ff80;box-shadow:0 0 20px #00ff80 inset}
        .img-wrapper img{width:100%;display:block;animation:glow 2s ease-in-out infinite alternate}
        @keyframes glow{from{box-shadow:0 0 10px #00ff80 inset}to{box-shadow:0 0 30px #00ff80 inset}}
        .racing-line{position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);animation:lineMove 1.5s linear infinite}
        @keyframes lineMove{to{left:120%}}
        .back{margin-top:1rem;display:block;padding:.8rem 2rem;background:#0055ff;color:#fff;border:none;border-radius:8px;text-align:center;cursor:pointer;transition:.2s}
        .back:hover{background:#0066ff}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="card">
        <h1>🌿 Green Zone Analysis</h1>
        <div class="img-wrapper">
            <div class="racing-line"></div>
            <img src="/api/highlight_image/{{ filename }}" alt="Green zones highlighted" onerror="this.alt='Failed to load image.'">
        </div>
        <a class="back" href="/">← Back to Predictor</a>
    </div>
</body>
</html>
