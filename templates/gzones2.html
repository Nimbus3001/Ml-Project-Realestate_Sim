<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green Zones</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
        .card { background: white; border-radius: 10px; padding: 24px; width: 100%; max-width: 800px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; margin-bottom: 8px; color: #222; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
        img { width: 100%; border-radius: 8px; border: 2px solid #ddd; }
        .back { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #333; color: white; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
        .back:hover { background: #111; }
        .legend { display: flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 0.85rem; color: #555; }
        .dot { width: 14px; height: 14px; background: #00cc00; border-radius: 50%; }
    </style>
</head>
<body>
<div class="card">
    <h1>🌿 Green Zone Analysis</h1>
    <p>Detected vegetation areas are highlighted in green.</p>
    <img src="/api/highlight_image/{{ filename }}" alt="Green zones highlighted"
         onerror="this.alt='Image could not be loaded. The session may have expired.';">
    <div class="legend"><div class="dot"></div> Highlighted = detected vegetation / green zones</div>
</div>
<a class="back" href="/">← Back to Predictor</a>
</body>
</html>
