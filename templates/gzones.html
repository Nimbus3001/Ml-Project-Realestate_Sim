<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌿 Green Zones – Urbanization Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ----- Core ----- */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0d0d12;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .container{position:relative;background:#111;max-width:900px;width:100%;border-radius:20px;overflow:hidden;box-shadow:0 0 30px rgba(0,0,0,.7)}
        h1{font-size:2.4rem;text-align:center;padding:1rem 0;background:linear-gradient(135deg,#00f,#a0f);-webkit-background-clip:text;color:transparent}
        /* ----- Animated Gradient Background ----- */
        .bg{position:absolute;inset:0;z-index:-2;background:linear-gradient(45deg,#0d0d12,#111,#0d0d12);
            background-size:400% 400%;animation:bgMove 20s ease infinite}
        @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        /* ----- Image Card ----- */
        .card{position:relative;padding:1rem;display:flex;flex-direction:column;align-items:center}
        .card img{max-width:100%;border-radius:12px;border:3px solid #00ff80;box-shadow:0 0 20px #00ff80 inset;animation:glow 2s ease-in-out infinite alternate}
        @keyframes glow{from{box-shadow:0 0 10px #00ff80 inset}to{box-shadow:0 0 30px #00ff80 inset}}
        /* ----- Racing line overlay ----- */
        .racing-line{position:absolute;top:0;left:-30%;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
            transform:skewX(-20deg);animation:lineMove 1.5s linear infinite}
        @keyframes lineMove{to{left:120%}}
        /* ----- Back button ----- */
        .back{margin:1rem auto;display:block;padding:.8rem 2rem;background:#0055ff;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:transform .2s,background .2s; text-decoration:none; font-weight:600}
        .back:hover{background:#0066ff;transform:scale(1.05)}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <h1>🌿 Green Zone Analysis</h1>
        <div class="card">
            <div class="racing-line"></div>
            <img src="/api/highlight_image/{{ filename }}" alt="Green zones highlighted" onerror="this.alt='Failed to load image.'">
        </div>
        <a class="back" href="/">← Back to Predictor</a>
    </div>
</body>
</html>
