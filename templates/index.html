<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Growth Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- Animated particle canvas -->
    <canvas id="particles" class="particles-canvas"></canvas>

    <!-- Scanline overlay -->
    <div class="scanlines"></div>

    <div class="app-wrapper">
        <!-- Top bar -->
        <header class="topbar">
            <div class="topbar-left">
                <div class="status-dot"></div>
                <span class="topbar-label">SYS:ONLINE</span>
            </div>
            <div class="topbar-logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                <span>URBANIX</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-label mono">v2.4.1</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="hero-text">
                <div class="hero-tag">
                    <span class="blink">▋</span> SATELLITE ANALYSIS MODULE
                </div>
                <h1>Urban <span class="gradient-text">Growth</span><br>Predictor</h1>
            </div>

            <!-- Upload Card -->
            <div class="upload-card" id="upload-card">
                <div class="card-glow"></div>
                <div class="card-corner tl"></div>
                <div class="card-corner tr"></div>
                <div class="card-corner bl"></div>
                <div class="card-corner br"></div>

                <div class="drop-zone" id="drop-zone">
                    <input type="file" id="file-input" accept="image/png,image/jpeg,image/jpg" hidden>

                    <!-- Placeholder -->
                    <div id="upload-placeholder" class="upload-placeholder">
                        <div class="upload-icon-wrap">
                            <svg class="upload-svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <div class="upload-ring"></div>
                        </div>
                        <p class="upload-main">DROP SATELLITE IMAGE</p>
                        <p class="upload-sub">PNG · JPG · JPEG &nbsp;|&nbsp; MAX 5MB</p>
                    </div>

                    <!-- Preview -->
                    <div id="preview-container" class="preview-container hidden">
                        <div class="scan-overlay" id="scan-overlay"></div>
                        <img id="image-preview" src="" alt="Preview">
                        <div class="img-corner tl"></div>
                        <div class="img-corner tr"></div>
                        <div class="img-corner bl"></div>
                        <div class="img-corner br"></div>
                        <button id="remove-btn" class="remove-btn" title="Remove">✕</button>
                    </div>
                </div>

                <!-- File info bar -->
                <div id="file-info" class="file-info hidden">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    <span id="file-name" class="mono"></span>
                    <span id="file-size" class="file-size-badge mono"></span>
                </div>
            </div>

            <!-- Analyze Button -->
            <button id="predict-btn" class="predict-btn" disabled>
                <span class="btn-inner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span id="btn-text">ANALYZE</span>
                </span>
                <div class="btn-glow"></div>
            </button>

            <!-- Result -->
            <div id="result-section" class="result-section hidden">
                <div class="result-line"></div>
                <div class="result-card">
                    <div class="result-card-corner tl"></div>
                    <div class="result-card-corner tr"></div>
                    <div class="result-card-corner bl"></div>
                    <div class="result-card-corner br"></div>

                    <div class="result-label mono">GROWTH CLASSIFICATION</div>
                    <div id="growth-badge" class="growth-badge">
                        <span id="growth-text"></span>
                    </div>
                    <div class="result-meta mono" id="result-meta"></div>
                </div>
            </div>
        </main>
    </div>

<script>
/* ============================
   PARTICLES BACKGROUND
   ============================ */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function createParticle() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        size: Math.random() * 1.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.1,
    };
}

for (let i = 0; i < 100; i++) particles.push(createParticle());

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(74, 222, 128, ${p.alpha})`;
        ctx.fill();

        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(74, 222, 128, ${0.08 * (1 - dist / 100)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(drawParticles);
}
drawParticles();

/* ============================
   UPLOAD LOGIC
   ============================ */
const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const placeholder  = document.getElementById('upload-placeholder');
const previewCont  = document.getElementById('preview-container');
const imgPreview   = document.getElementById('image-preview');
const removeBtn    = document.getElementById('remove-btn');
const predictBtn   = document.getElementById('predict-btn');
const btnText      = document.getElementById('btn-text');
const fileInfo     = document.getElementById('file-info');
const fileName     = document.getElementById('file-name');
const fileSize     = document.getElementById('file-size');
const resultSection = document.getElementById('result-section');
const growthBadge  = document.getElementById('growth-badge');
const growthText   = document.getElementById('growth-text');
const resultMeta   = document.getElementById('result-meta');
const scanOverlay  = document.getElementById('scan-overlay');

let selectedFile = null;

dropZone.addEventListener('click', e => { if (e.target !== removeBtn) fileInput.click(); });

['dragenter','dragover','dragleave','drop'].forEach(ev => {
    dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
    document.body.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); });
});

dropZone.addEventListener('dragenter', () => dropZone.classList.add('dragging'));
dropZone.addEventListener('dragover',  () => dropZone.classList.add('dragging'));
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));

dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragging');
    const files = e.dataTransfer.files;
    if (files.length) processFile(files[0]);
});

fileInput.addEventListener('change', e => { if (e.target.files.length) processFile(e.target.files[0]); });

removeBtn.addEventListener('click', e => { e.stopPropagation(); resetUpload(); });

function processFile(file) {
    if (!file.type.match('image/.*')) { alert('Please upload an image file.'); return; }
    if (file.size > 5 * 1024 * 1024)  { alert('File must be under 5MB.');      return; }

    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        imgPreview.src = e.target.result;
        placeholder.classList.add('hidden');
        previewCont.classList.remove('hidden');
        fileInfo.classList.remove('hidden');
        fileName.textContent = file.name;
        fileSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
        predictBtn.removeAttribute('disabled');
        resultSection.classList.add('hidden');

        // Trigger scan animation
        scanOverlay.style.animation = 'none';
        void scanOverlay.offsetWidth;
        scanOverlay.style.animation = 'scan 2s ease-in-out forwards';
    };
    reader.readAsDataURL(file);
}

function resetUpload() {
    selectedFile = null;
    fileInput.value = '';
    imgPreview.src = '';
    placeholder.classList.remove('hidden');
    previewCont.classList.add('hidden');
    fileInfo.classList.add('hidden');
    predictBtn.setAttribute('disabled', 'true');
    resultSection.classList.add('hidden');
}

/* ============================
   PREDICT
   ============================ */
const fakeSteps = ['Initializing model...', 'Extracting features...', 'Classifying growth...', 'Done.'];

predictBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    predictBtn.setAttribute('disabled', 'true');
    resultSection.classList.add('hidden');

    let step = 0;
    const interval = setInterval(() => {
        btnText.textContent = fakeSteps[step] || 'Analyzing...';
        step++;
        if (step >= fakeSteps.length) clearInterval(interval);
    }, 600);

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
        const res  = await fetch('/predict', { method: 'POST', body: formData });
        const data = await res.json();
        clearInterval(interval);

        if (!res.ok) throw new Error(data.error || 'Server error');

        const growth = data.growth;
        growthText.textContent = growth.toUpperCase();

        growthBadge.className = 'growth-badge';
        if (growth === 'High')        growthBadge.classList.add('badge-high');
        else if (growth === 'Medium') growthBadge.classList.add('badge-medium');
        else                          growthBadge.classList.add('badge-low');

        const ts = new Date().toLocaleTimeString();
        resultMeta.textContent = `CLASSIFIED AT ${ts}`;

        resultSection.classList.remove('hidden');
        resultSection.style.animation = 'none';
        void resultSection.offsetWidth;
        resultSection.style.animation = 'slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards';

    } catch (err) {
        clearInterval(interval);
        alert('Error: ' + err.message);
    } finally {
        btnText.textContent = 'ANALYZE';
        predictBtn.removeAttribute('disabled');
    }
});
</script>
</body>
</html>
